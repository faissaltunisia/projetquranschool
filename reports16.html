<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>تقارير الغياب - مدرسة القرآن الكريم</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #047857;
            --accent: #b45309;
            --light: #f8fafc;
            --danger: #b91c1c;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --shadow: 0 4px 12px rgba(0,0,0,0.12);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', Arial, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            padding: 20px;
            min-height: 100vh;
            line-height: 1.6;
            color: var(--text);
            font-size: 15px;
        }
        
        .container { max-width: 1100px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 28px; box-shadow: var(--shadow); }
        header { text-align: center; margin-bottom: 25px; padding-bottom: 18px; border-bottom: 3px solid var(--primary); }
        header h1 { color: var(--primary); font-size: 1.5em; font-weight: 700; margin-bottom: 6px; }
        header p { color: var(--text-muted); font-size: 0.95em; }

        /* === الفلاتر === */
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; background: var(--light); padding: 16px; border-radius: 10px; border: 1px solid var(--border); }
        .filters select { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; font-family: inherit; }
        .filters select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(30,58,138,0.1); }
        .filters button { background: var(--primary); color: #fff; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; transition: 0.2s; }
        .filters button:hover { background: #1e40af; transform: translateY(-1px); }
        .filters button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* === جدول المقارنة === */
        .comparison-section { margin-bottom: 28px; }
        .comparison-section h3 { color: var(--primary); margin-bottom: 14px; font-size: 1.2em; border-bottom: 2px solid var(--light); padding-bottom: 8px; }
        .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
        .comparison-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.95em; }
        .comparison-table th { background: var(--primary); color: #fff; padding: 12px 14px; text-align: right; font-weight: 600; position: sticky; top: 0; }
        .comparison-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
        .comparison-table tr:hover { background: #f8fafc; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--secondary); border-radius: 4px; transition: width 0.4s; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 600; display: inline-block; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        /* === منشئ التقارير === */
        .report-builder { background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 25px; }
        .report-builder h3 { color: var(--primary); margin-bottom: 16px; border-bottom: 2px dashed var(--border); padding-bottom: 10px; font-size: 1.15em; }
        .radio-group { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
        .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500; background: #fff; padding: 10px 16px; border-radius: 8px; border: 2px solid var(--border); transition: 0.2s; flex: 1; min-width: 140px; justify-content: center; font-family: inherit; }
        .radio-label:hover { border-color: var(--primary); background: #eff6ff; }
        .radio-label.active { background: #dbeafe; border-color: var(--primary); color: var(--primary); font-weight: 600; }
        .builder-filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .builder-filters select { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; font-family: inherit; }
        .builder-filters select:focus { border-color: var(--secondary); outline: none; }
        .builder-filters button { background: var(--secondary); color: #fff; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; font-family: inherit; }
        .builder-filters button:hover { background: #065f46; transform: translateY(-1px); }

        /* === 📄 معاينة التقرير الاحترافية === */
        #customReport { display: none; margin: 20px auto 30px; }
        #customReport.show { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .report-page {
            background: #fff;
            max-width: 210mm;
            margin: 0 auto;
            padding: 16mm 14mm;
            box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.15);
            border-radius: 6px;
            position: relative;
        }
        
        .report-header { text-align: center; padding-bottom: 12px; margin-bottom: 16px; border-bottom: 3px double var(--primary); }
        .report-header .school-name { font-size: 1.4em; font-weight: 800; color: #1e3a8a; margin-bottom: 4px; }
        .report-header .report-title { font-size: 1.1em; font-weight: 600; color: #334155; margin-bottom: 8px; }
        .report-header .report-meta { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; font-size: 0.85em; color: #475569; }
        .report-header .report-meta span { display: flex; align-items: center; gap: 6px; }
        
        .report-subject { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 24px; padding: 14px 16px; margin-bottom: 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; }
        .subject-item { display: flex; gap: 8px; align-items: baseline; }
        .subject-item .label { font-weight: 700; color: #1e3a8a; min-width: 75px; font-size: 0.95em; }
        .subject-item .value { color: var(--text); font-weight: 500; flex: 1; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
        .stat-card { text-align: center; padding: 12px 8px; background: #fff; border: 1px solid var(--border); border-radius: 6px; }
        .stat-card .stat-value { font-size: 1.6em; font-weight: 800; color: #1e3a8a; line-height: 1.1; margin-bottom: 4px; }
        .stat-card .stat-label { font-size: 0.8em; color: var(--text-muted); font-weight: 500; }
        .stat-card.danger .stat-value { color: #b91c1c; }
        .stat-card.warning .stat-value { color: #b45309; }
        .stat-card.success .stat-value { color: #047857; }
        
        .section-title { font-size: 1.05em; font-weight: 700; color: #1e3a8a; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: #b45309; border-radius: 2px; }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.9em; margin-bottom: 12px; }
        .data-table th { background: #f1f5f9; padding: 10px 12px; text-align: right; font-weight: 700; border: 1px solid var(--border); color: #334155; }
        .data-table td { padding: 10px 12px; border: 1px solid var(--border); vertical-align: middle; }
        .data-table tbody tr:hover { background: #f8fafc; }
        .data-table .text-center { text-align: center; }
        .data-table .text-danger { color: #b91c1c; font-weight: 600; }
        .data-table .text-success { color: #047857; font-weight: 600; }
        
        .alert { margin: 14px 0; padding: 12px 16px; border-radius: 6px; border-right: 4px solid; display: flex; align-items: flex-start; gap: 10px; font-size: 0.95em; }
        .alert-warning { background: #fffbeb; color: #92400e; border-color: #f59e0b; }
        .alert-info { background: #eff6ff; color: #1e40af; border-color: #3b82f6; }
        
        .report-footer { margin-top: 25px; padding-top: 15px; border-top: 2px dashed var(--border); display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .footer-item { display: flex; flex-direction: column; align-items: center; }
        .footer-item .title { font-weight: 700; margin-bottom: 20px; color: #334155; }
        .footer-item .line { width: 80%; height: 2px; background: #333; margin-bottom: 5px; }
        .footer-item .note { font-size: 0.8em; color: #64748b; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .btn-print { background: var(--primary); color: #fff; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; font-family: inherit; box-shadow: 0 2px 8px rgba(30,58,138,0.2); transition: 0.2s; }
        .btn-print:hover { background: #1e40af; transform: translateY(-2px); }

        /* === 📱 تحسينات الهاتف === */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 18px; border-radius: 12px; }
            .report-page { padding: 10mm 8mm; max-width: 100%; box-shadow: none; border-radius: 8px; }
            .report-subject { grid-template-columns: 1fr; gap: 12px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .report-footer { grid-template-columns: 1fr; gap: 20px; }
            .filters, .builder-filters { grid-template-columns: 1fr; }
            .radio-group { flex-direction: column; }
            .radio-label { min-height: 48px; justify-content: flex-start; }
            .btn-print { width: 100%; justify-content: center; }
        }

        /* === 🖨️ تنسيق الطباعة - مطابق تماماً للمعاينة === */
        @media print {
            @page { size: A4; margin: 10mm; }
            html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
            
            /* إخفاء واجهة التطبيق بالكامل */
            .container > header, .filters, .comparison-section, .report-builder, #reportActions, .btn-print { display: none !important; }
            
            /* إظهار التقرير فقط */
            #customReport { display: block !important; margin: 0 !important; padding: 0 !important; }
            
            /* إزالة الزخارف الخاصة بالشاشة فقط */
            .report-page {
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                background: #fff !important;
            }
            
            /* 🎨 إجبار المتصفح على طباعة الألوان والخلفيات كما هي */
            *, *::before, *::after {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            
            /* 🔹 ثبات التخطيط والشبكات مطابق للشاشة */
            .report-subject { grid-template-columns: repeat(2, 1fr) !important; }
            .stats-grid { grid-template-columns: repeat(4, 1fr) !important; }
            .report-footer { grid-template-columns: repeat(3, 1fr) !important; }
            
            /* 🎨 ثبات الألوان والخطوط */
            .report-header .school-name { color: #1e3a8a !important; }
            .report-header .report-title { color: #334155 !important; }
            .report-header .report-meta { color: #475569 !important; }
            .section-title { color: #1e3a8a !important; border-bottom-color: #cbd5e1 !important; }
            .subject-item .label { color: #1e3a8a !important; }
            .subject-item .value { color: #0f172a !important; }
            .stat-card .stat-value { color: #1e3a8a !important; }
            .stat-card.danger .stat-value { color: #b91c1c !important; }
            .stat-card.warning .stat-value { color: #b45309 !important; }
            .stat-card.success .stat-value { color: #047857 !important; }
            .stat-card .stat-label { color: #64748b !important; }
            .data-table th { background: #f1f5f9 !important; color: #334155 !important; }
            .data-table td { color: #0f172a !important; }
            .alert-warning { background: #fffbeb !important; color: #92400e !important; border-color: #f59e0b !important; }
            .alert-info { background: #eff6ff !important; color: #1e40af !important; border-color: #3b82f6 !important; }
            .footer-item .title { color: #334155 !important; }
            .footer-item .note { color: #64748b !important; }
            
            /* 📄 منع قص العناصر المهمة بين الصفحات */
            .report-subject, .stats-grid, .alert, .report-footer { page-break-inside: avoid !important; }
            .data-table thead { display: table-header-group !important; }
            .data-table tr { page-break-inside: avoid !important; page-break-after: auto !important; }
        }

        @media print and (max-width: 480px) {
            @page { margin: 6mm 4mm; }
            .report-page { padding: 0 !important; }
            .report-subject { grid-template-columns: 1fr !important; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📊 نظام تقارير الغياب المدرسية</h1>
        <p>مدرسة تحفيظ القرآن الكريم • إدارة المتابعة والحضور</p>
    </header>

    <div class="filters">
        <select id="filterGroup" onchange="onFilterChange()" disabled><option value="">⏳ جاري التحميل...</option></select>
        <select id="filterSection" onchange="onFilterChange()" disabled><option value="">⏳ جاري التحميل...</option></select>
        <button id="loadBtn" onclick="loadComparisonTable()" disabled>🔄 تحديث البيانات</button>
    </div>

    <div class="comparison-section">
        <h3>📈 مقارنة نسب الغياب بين الشعب</h3>
        <div class="table-wrapper">
            <table class="comparison-table">
                <thead><tr><th>الشعبة</th><th>المجموعة</th><th>الطلاب</th><th>أيام الغياب</th><th>النسبة</th><th>الحالة</th></tr></thead>
                <tbody id="comparisonBody"><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted);">⏳ جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="report-builder">
        <h3>📋 إنشاء تقرير مفصل</h3>
        <div class="radio-group">
            <label class="radio-label active"><input type="radio" name="reportType" value="student" checked onchange="toggleReportFields()"> 👤 تقرير طالب</label>
            <label class="radio-label"><input type="radio" name="reportType" value="section" onchange="toggleReportFields()"> 🏫 تقرير شعبة</label>
        </div>
        <div class="builder-filters">
            <select id="rptGroup" onchange="onReportGroupChange()" disabled><option value="">✦ اختر المجموعة ✦</option><option value="أ">أ</option><option value="ب">ب</option></select>
            <select id="rptSection" onchange="onReportSectionChange()" disabled><option value="">✦ اختر الشعبة ✦</option></select>
            <select id="rptStudent" style="display:none;"><option value="">✦ اختر الطالب ✦</option></select>
            <button onclick="generateCustomReport()" id="genBtn" disabled>📊 إنشاء التقرير</button>
        </div>
    </div>

    <div id="customReport"></div>
    <div id="reportActions" style="display:none;"><div class="actions"><button class="btn-print" onclick="printReport()">🖨️ طباعة التقرير</button></div></div>
</div>

<script>
const $ = id => document.getElementById(id);
let allSections = [], dataLoaded = false;

function deepTrim(obj) {
    if (typeof obj === 'string') return obj.trim();
    if (Array.isArray(obj)) return obj.map(deepTrim);
    if (obj !== null && typeof obj === 'object') return Object.fromEntries(Object.entries(obj).map(([k, v]) => [k.trim(), deepTrim(v)]));
    return obj;
}

async function loadData() {
    try {
        const [resA, resB] = await Promise.all([
            fetch('/api/get-section?group=أ').then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch('/api/get-section?group=ب').then(r => r.ok ? r.json() : null).catch(()=>null)
        ]);
        
        const parse = (raw, g) => {
            if (!raw) return [];
            const c = deepTrim(raw);
            if (Array.isArray(c)) return c.map(s => ({...s, group: g}));
            if (c.sections) return c.sections.map(s => ({...s, group: g}));
            if (c.section_id) return [{...c, group: g}];
            return [];
        };
        allSections = [...parse(resA, 'أ'), ...parse(resB, 'ب')];
        if (!allSections.length) throw new Error('لا توجد بيانات');
        
        ['filterGroup','filterSection','rptGroup','rptSection','loadBtn','genBtn'].forEach(id => $(id).disabled = false);
        $('filterGroup').innerHTML = `<option value="">📁 الكل</option><option value="أ">أ</option><option value="ب">ب</option>`;
        $('rptGroup').innerHTML = `<option value="">✦ المجموعة ✦</option><option value="أ">أ</option><option value="ب">ب</option>`;
        updateSectionsDropdown(); onReportGroupChange(); loadComparisonTable(); dataLoaded = true;
    } catch(e) {
        $('comparisonBody').innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--danger);">❌ ${e.message}</td></tr>`;
        ['loadBtn','genBtn'].forEach(b => $(b).disabled = true);
    }
}

function updateSectionsDropdown() {
    const g = $('filterGroup').value, s = $('filterSection'), c = s.value;
    s.innerHTML = '<option value="">🏫 الكل</option>';
    allSections.filter(sec => !g || sec.group === g).forEach(sec => {
        s.appendChild(Object.assign(document.createElement('option'), {value: sec.section_id, textContent: sec.section_label || sec.section_id}));
    });
    if (c && [...s.options].some(o => o.value === c)) s.value = c;
}
function onFilterChange() { updateSectionsDropdown(); loadComparisonTable(); }

async function loadComparisonTable() {
    if (!dataLoaded) return;
    const g = $('filterGroup').value, sec = $('filterSection').value, tb = $('comparisonBody');
    let data = allSections.filter(s => (!g || s.group === g) && (!sec || s.section_id === sec));
    if (!data.length) return tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted);">لا توجد بيانات</td></tr>';
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">⏳ جاري الحساب...</td></tr>';
    
    const res = await Promise.all(data.map(async sec => {
        const cnt = sec.students?.length || 0;
        try {
            const j = await (await fetch(`/api/get-reports?action=summary&group=${sec.group}&section=${sec.section_id}&period=custom&startDate=2000-01-01&endDate=2099-12-31`)).json();
            const sum = j.data || j.summary || {};
            const abs = sum.totalAbsent || 0, days = sum.totalDays || 1;
            const rate = cnt && days ? ((abs/(cnt*days))*100).toFixed(1) : 0;
            return {...sec, cnt, abs, rate: parseFloat(rate)};
        } catch { return {...sec, cnt, abs: 0, rate: 0}; }
    }));
    const max = Math.max(...res.map(r => r.rate), 1);
    tb.innerHTML = res.map(r => {
        const w = Math.min((r.rate/max)*100, 100);
        const st = r.rate >= 5 ? {c:'badge-danger', t:'🔴 عالي'} : r.rate >= 2 ? {c:'badge-warning', t:'🟡 متوسط'} : {c:'badge-success', t:'🟢 منخفض'};
        return `<tr><td><strong>${r.section_label||r.section_id}</strong></td><td>${r.group}</td><td class="text-center">${r.cnt}</td><td class="text-center">${r.abs}</td><td><strong>${r.rate}%</strong><div class="progress-bar"><div class="progress-fill" style="width:${w}%"></div></div></td><td class="text-center"><span class="badge ${st.c}">${st.t}</span></td></tr>`;
    }).join('');
}

function toggleReportFields() {
    const t = document.querySelector('input[name="reportType"]:checked').value;
    $('rptStudent').style.display = t==='student' ? 'block' : 'none';
    document.querySelectorAll('.radio-label').forEach(l => l.classList.toggle('active', l.querySelector('input').checked));
    if (t==='student' && $('rptSection').value) updateStudentsDropdown();
}
function onReportGroupChange() {
    const g = $('rptGroup').value, ss = $('rptSection'), st = $('rptStudent');
    ss.disabled = !g; ss.innerHTML = '<option value="">✦ الشعبة ✦</option>'; st.innerHTML = '<option value="">✦ الطالب ✦</option>'; st.style.display = 'none';
    if (!g) return;
    allSections.filter(s => s.group === g).forEach(s => ss.appendChild(Object.assign(document.createElement('option'), {value: s.section_id, textContent: s.section_label || s.section_id})));
}
function onReportSectionChange() {
    const t = document.querySelector('input[name="reportType"]:checked').value;
    if (t==='student' && $('rptSection').value) { updateStudentsDropdown(); $('rptStudent').style.display = 'block'; }
    else $('rptStudent').style.display = 'none';
}
function updateStudentsDropdown() {
    const sec = $('rptSection').value, st = $('rptStudent');
    st.innerHTML = '<option value="">✦ الطالب ✦</option>';
    allSections.find(s => s.section_id === sec)?.students?.forEach(s => st.appendChild(Object.assign(document.createElement('option'), {value: s.id, textContent: s.name})));
}

function generateCustomReport() {
    const t = document.querySelector('input[name="reportType"]:checked').value;
    const g = $('rptGroup').value, s = $('rptSection').value;
    if (!g || !s) return alert('⚠️ اختر المجموعة والشعبة');
    if (t==='student' && !$('rptStudent').value) return alert('⚠️ اختر الطالب');
    
    const rpt = $('customReport'), act = $('reportActions');
    rpt.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">⏳ جاري الإعداد...</div>';
    rpt.classList.add('show'); act.style.display = 'none';
    setTimeout(() => {
        if (t==='student') genStudent(g, s, $('rptStudent').value, rpt);
        else genSection(g, s, rpt);
        act.style.display = 'block';
    }, 200);
}

async function genStudent(g, secId, stuId, con) {
    const sec = allSections.find(s => s.section_id === secId);
    const stu = sec?.students?.find(s => s.id === stuId);
    if (!stu) return con.innerHTML = '<div class="report-page"><div class="alert alert-warning">⚠️ لم يُعثر على الطالب</div></div>';
    
    try {
        const j = await (await fetch(`/api/get-reports?action=student-history&studentId=${encodeURIComponent(stuId)}`)).json();
        const hist = j.data?.history || j.history || [];
        const total = 20, rate = ((total - hist.length)/total*100).toFixed(0);
        const st = hist.length >= 5 ? {t:'متكرر', c:'danger'} : hist.length >= 3 ? {t:'مراقبة', c:'warning'} : {t:'جيد', c:'success'};
        
        con.innerHTML = `<div class="report-page">
            <div class="report-header">
                <div class="school-name">🕌 مدرسة تحفيظ القرآن الكريم</div>
                <div class="report-title">تقرير متابعة الغياب الفردي</div>
                <div class="report-meta">
                    <span>📅 ${new Date().toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'})}</span>
                    <span>🕐 ${new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                    <span>🆔 ${Date.now().toString(36).toUpperCase()}</span>
                </div>
            </div>
            <div class="report-subject">
                <div class="subject-item"><span class="label">اسم الطالب:</span><span class="value">${stu.name}</span></div>
                <div class="subject-item"><span class="label">الشعبة:</span><span class="value">${sec.section_label || secId}</span></div>
                <div class="subject-item"><span class="label">المجموعة:</span><span class="value">${g}</span></div>
                <div class="subject-item"><span class="label">الفترة:</span><span class="value">الفصل الدراسي الحالي</span></div>
                <div class="subject-item"><span class="label">حالة الحضور:</span><span class="value" style="color:var(--${st.c})">${st.t}</span></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card ${st.c}"><div class="stat-value">${hist.length}</div><div class="stat-label">أيام الغياب</div></div>
                <div class="stat-card success"><div class="stat-value">${rate}%</div><div class="stat-label">نسبة الحضور</div></div>
                <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">إجمالي الأيام</div></div>
                <div class="stat-card"><div class="stat-value">${st.t}</div><div class="stat-label">التقييم</div></div>
            </div>
            <div class="section-title">📅 سجل الغياب</div>
            <table class="data-table"><thead><tr><th style="width:35%">التاريخ</th><th style="width:25%">اليوم</th><th style="width:25%">الحصة/المادة</th><th style="width:15%">ملاحظات</th></tr></thead><tbody>
                ${hist.length ? hist.map(h => `<tr><td><strong>${h.date}</strong></td><td class="text-center">${getDay(h.date)}</td><td>${h.subject||h.section||'-'}</td><td class="text-center">${h.note||'-'}</td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--secondary);">✅ لا توجد سجلات غياب</td></tr>'}
            </tbody></table>
            ${hist.length >= 3 ? '<div class="alert alert-warning"><span>⚠️</span><div><strong>تنبيه:</strong> يُوصى بالتواصل مع ولي الأمر لمناقشة أسباب الغياب المتكرر.</div></div>' : '<div class="alert alert-info"><span>✨</span><div><strong>إيجابي:</strong> الطالب ملتزم بالحضور. نوصي بالاستمرار في التشجيع.</div></div>'}
            <div class="report-footer"><div class="footer-item"><div class="title">معلم المادة</div><div class="line"></div><div class="note">التوقيع والختم</div></div><div class="footer-item"><div class="title">مدير المدرسة</div><div class="line"></div><div class="note">التوقيع والختم</div></div><div class="footer-item"><div class="title">أولياء الأمور</div><div class="line"></div><div class="note">التوقيع</div></div></div>
        </div>`;
    } catch(e) { con.innerHTML = `<div class="report-page"><div class="alert alert-warning">❌ ${e.message}</div></div>`; }
}

async function genSection(g, secId, con) {
    const sec = allSections.find(s => s.section_id === secId);
    const stus = sec?.students || [];
    if (!sec) return con.innerHTML = '<div class="report-page"><div class="alert alert-warning">⚠️ الشعبة غير موجودة</div></div>';
    
    try {
        const j = await (await fetch(`/api/get-reports?action=summary&group=${g}&section=${secId}&period=custom&startDate=2000-01-01&endDate=2099-12-31`)).json();
        const sum = j.data || j.summary || {};
        const abs = sum.totalAbsent || 0, days = sum.totalDays || 1;
        const rate = stus.length && days ? ((abs/(stus.length*days))*100).toFixed(1) : 0;
        const avg = stus.length ? (abs/stus.length).toFixed(1) : 0;
        const st = rate >= 5 ? {t:'عالي', c:'danger'} : rate >= 2 ? {t:'متوسط', c:'warning'} : {t:'منخفض', c:'success'};
        
        con.innerHTML = `<div class="report-page">
            <div class="report-header">
                <div class="school-name">🕌 مدرسة تحفيظ القرآن الكريم</div>
                <div class="report-title">تقرير متابعة الغياب للشعبة</div>
                <div class="report-meta">
                    <span>📅 ${new Date().toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'})}</span>
                    <span>🕐 ${new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                    <span>🆔 ${Date.now().toString(36).toUpperCase()}</span>
                </div>
            </div>
            <div class="report-subject">
                <div class="subject-item"><span class="label">اسم الشعبة:</span><span class="value">${sec.section_label || secId}</span></div>
                <div class="subject-item"><span class="label">المجموعة:</span><span class="value">${g}</span></div>
                <div class="subject-item"><span class="label">عدد الطلاب:</span><span class="value">${stus.length} طالب</span></div>
                <div class="subject-item"><span class="label">الفترة:</span><span class="value">الفصل الدراسي الحالي</span></div>
                <div class="subject-item"><span class="label">مستوى الغياب:</span><span class="value" style="color:var(--${st.c})">${st.t}</span></div>
                <div class="subject-item"><span class="label">متوسط/طالب:</span><span class="value">${avg} يوم</span></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${stus.length}</div><div class="stat-label">إجمالي الطلاب</div></div>
                <div class="stat-card ${st.c}"><div class="stat-value">${rate}%</div><div class="stat-label">نسبة الغياب</div></div>
                <div class="stat-card"><div class="stat-value">${abs}</div><div class="stat-label">أيام غياب</div></div>
                <div class="stat-card"><div class="stat-value">${avg}</div><div class="stat-label">متوسط الغياب</div></div>
            </div>
            <div class="section-title">👥 كشف متابعة الطلاب</div>
            <table class="data-table"><thead><tr><th>اسم الطالب</th><th class="text-center">الغياب</th><th class="text-center">الحضور%</th><th class="text-center">الحالة</th></tr></thead><tbody>
                ${stus.length ? await Promise.all(stus.map(async s => {
                    try {
                        const d = await (await fetch(`/api/get-reports?action=student-history&studentId=${encodeURIComponent(s.id)}`)).json();
                        const a = (d.data?.history || d.history || []).length;
                        const r = ((20-a)/20*100).toFixed(0);
                        const t = a >= 5 ? {t:'متكرر',c:'text-danger'} : a >= 3 ? {t:'مراقبة',c:'text-warning'} : {t:'جيد',c:'text-success'};
                        return `<tr><td><strong>${s.name}</strong></td><td class="text-center ${a?'text-danger':''}">${a}</td><td class="text-center">${r}%</td><td class="text-center ${t.c}">${t.t}</td></tr>`;
                    } catch { return `<tr><td><strong>${s.name}</strong></td><td class="text-center">-</td><td class="text-center">-</td><td class="text-center">-</td></tr>`; }
                })).then(r=>r.join('')) : '<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--text-muted);">📭 لا توجد بيانات</td></tr>'}
            </tbody></table>
            ${rate >= 5 ? '<div class="alert alert-warning"><span>⚠️</span><div><strong>توصية:</strong> النسبة مرتفعة. يُنصح بعقد اجتماع مع المعلم وأولياء الأمور.</div></div>' : '<div class="alert alert-info"><span>✅</span><div><strong>ملاحظة:</strong> المستوى مقبول. الاستمرار في المتابعة الدورية يحافظ على الأداء.</div></div>'}
            <div class="report-footer"><div class="footer-item"><div class="title">المشرف التربوي</div><div class="line"></div><div class="note">التوقيع والختم</div></div><div class="footer-item"><div class="title">مدير المدرسة</div><div class="line"></div><div class="note">التوقيع والختم</div></div><div class="footer-item"><div class="title">سجل المتابعة</div><div class="line"></div><div class="note">تاريخ الأرشفة</div></div></div>
        </div>`;
    } catch(e) { con.innerHTML = `<div class="report-page"><div class="alert alert-warning">❌ ${e.message}</div></div>`; }
}

function getDay(d) { return d ? ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][new Date(d).getDay()] : '-'; }

function printReport() {
    if (!$('customReport').innerHTML.trim()) return alert('⚠️ لا يوجد تقرير');
    $('customReport').classList.add('show');
    // تأخير بسيط لضمان اكتمال عرض DOM قبل فتح نافذة الطباعة
    setTimeout(() => window.print(), 50);
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
