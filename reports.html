<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الغياب - مدرسة القرآن الكريم</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --light: #ecf0f1; --danger: #c0392b; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1150px; margin: 0 auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--light); }
        header h1 { color: var(--primary); margin: 0; font-size: 1.6em; }
        header p { color: #666; margin: 5px 0 0; }

        .filters, .report-filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .filters { background: var(--light); padding: 15px; border-radius: 12px; }
        .filters select, .filters input, .report-filters select, .report-filters input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .filters button, .report-filters button { background: var(--primary); color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .filters button:disabled, .report-filters button:disabled { opacity: 0.5; cursor: not-allowed; }

        .report-builder { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .report-builder h3 { margin: 0 0 15px; color: var(--primary); border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .radio-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; font-size: 1.05em; background: var(--light); padding: 10px 15px; border-radius: 8px; border: 2px solid transparent; transition: all 0.2s; flex: 1; justify-content: center; }
        .radio-label:hover { background: #e0e5ec; border-color: #bbb; }
        .radio-label.active { background: #e8f0fe; border-color: var(--primary); color: var(--primary); }
        .radio-label input[type="radio"] { margin: 0; transform: scale(1.4); cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, var(--primary), #34495e); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card.green { background: linear-gradient(135deg, var(--secondary), #2ecc71); }
        .stat-card.orange { background: linear-gradient(135deg, var(--accent), #f39c12); }
        .stat-number { font-size: 1.8em; font-weight: bold; margin: 5px 0; }
        .stat-label { font-size: 0.85em; opacity: 0.9; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--light); }
        .chart-box h3 { margin: 0 0 10px; color: var(--primary); font-size: 1em; }
        .chart-container { position: relative; height: 220px; }

        #customReport { display: none; margin-top: 15px; padding: 25px; background: #fff; border: 2px solid var(--primary); border-radius: 12px; }
        #customReport.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .report-header { display: none; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px dashed #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { padding: 10px; text-align: right; border: 1px solid #ddd; }
        th { background: var(--light); color: var(--primary); font-weight: 600; }

        .actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-act { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; display: flex; align-items: center; gap: 6px; }
        .btn-print { background: var(--primary); }
        .btn-share { background: var(--accent); }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; padding: 10px; }
            .filters, .stats-grid, .charts-grid, .report-filters, .radio-group, #reportActionsBtn { display: none !important; }
            #customReport { display: block !important; border: none; padding: 0; margin: 0; }
            #customReport table { width: 100%; border: 1px solid #000; }
            #customReport th, #customReport td { border: 1px solid #000; padding: 8px; }
            .report-header { display: block !important; border-bottom: 2px solid #000; margin-bottom: 20px; }
            .report-header h2 { margin: 0; font-size: 18pt; }
            .report-header h3 { margin: 5px 0; font-size: 14pt; }
        }
        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            .filters, .report-filters { grid-template-columns: 1fr 1fr; }
            .radio-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <header><h1>📊 تقارير وإحصائيات الغياب</h1><p>يتم جلب البيانات مباشرة من مجلد <code>attendance_logs/</code></p></header>

    <div class="filters">
        <select id="filterGroup"><option value="">كل المجموعات</option><option value="أ">المجموعة (أ)</option><option value="ب">المجموعة (ب)</option></select>
        <select id="filterSection"><option value="">كل الشعب</option></select>
        <select id="filterPeriod"><option value="week">آخر 7 أيام</option><option value="month">آخر 30 يوم</option><option value="custom">فترة مخصصة</option></select>
        <input type="date" id="filterStart" style="display:none;"><input type="date" id="filterEnd" style="display:none;">
        <button id="loadBtn" onclick="loadReports()">🔄 تحديث البيانات</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">إجمالي الطلاب الفعلي</div><div class="stat-number" id="statTotalStudents">-</div></div>
        <div class="stat-card green"><div class="stat-label">إجمالي الغياب المسجل</div><div class="stat-number" id="statAbsent">-</div></div>
        <div class="stat-card orange"><div class="stat-label">أيام التسجيل</div><div class="stat-number" id="statDays">-</div></div>
        <div class="stat-card"><div class="stat-label">متوسط نسبة الغياب</div><div class="stat-number" id="statRate">-</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><h3>📈 اتجاه الغياب اليومي</h3><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
        <div class="chart-box"><h3>🥧 أعلى 5 شعب غياباً</h3><div class="chart-container"><canvas id="sectionChart"></canvas></div></div>
    </div>

    <div class="report-builder">
        <h3>📄 إنشاء تقرير مخصص</h3>
        <div class="radio-group">
            <label class="radio-label active">
                <input type="radio" name="reportType" value="student" checked> 👤 تقرير طالب محدد
            </label>
            <label class="radio-label">
                <input type="radio" name="reportType" value="section"> 🏫 تقرير شعبة كاملة
            </label>
        </div>
        <div class="report-filters">
            <select id="rptGroup"><option value="">المجموعة</option><option value="أ">أ</option><option value="ب">ب</option></select>
            <select id="rptSection"><option value="">الشعبة</option></select>
            <select id="rptStudent"><option value="">اختر الطالب</option></select>
            <button onclick="generateCustomReport()">📊 عرض التقرير</button>
        </div>
    </div>

    <div id="customReport"></div>
    <div id="reportActionsBtn" style="display:none; margin:10px 0;">
        <button class="btn-act btn-print" onclick="window.print()">🖨️ طباعة التقرير</button>
        <button class="btn-act btn-share" onclick="navigator.clipboard.writeText(location.href).then(()=>alert('✅ تم نسخ الرابط'))">🔗 مشاركة</button>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let trendChart, sectionChart;
let allSections = [];

function deepTrim(obj) {
    if (typeof obj === 'string') return obj.trim();
    if (Array.isArray(obj)) return obj.map(deepTrim);
    if (obj && typeof obj === 'object') return Object.fromEntries(Object.entries(obj).map(([k, v]) => [k.trim(), deepTrim(v)]));
    return obj;
}

function updateDropdowns() {
    const g = $('rptGroup').value || $('filterGroup').value;
    const rSec = $('rptSection'); 
    rSec.innerHTML = '<option value="">الشعبة</option>';
    const filtered = g ? allSections.filter(s => s.group === g) : allSections;
    filtered.forEach(s => { if(s.section_id) { const o=document.createElement('option'); o.value=s.section_id; o.textContent=s.section_label||s.section_id; rSec.appendChild(o); } });
    updateRptStudents();
}

function updateRptStudents() {
    const g = $('rptGroup').value, sec = $('rptSection').value;
    const stuSel = $('rptStudent');
    const type = document.querySelector('input[name="reportType"]:checked').value;
    if (type === 'section') { stuSel.style.display = 'none'; return; }
    stuSel.style.display = 'block';
    stuSel.innerHTML = '<option value="">اختر الطالب</option>';
    if(!g || !sec) return;
    const secData = allSections.find(s => s.group === g && s.section_id === sec);
    if(secData?.students) {
        secData.students.forEach(st => {
            const o = document.createElement('option'); o.value = (st.id || '').trim(); o.textContent = (st.name || st.id || 'طالب').trim(); stuSel.appendChild(o);
        });
    }
}

function getActualStudentCount() {
    const g = $('filterGroup').value, sec = $('filterSection').value;
    let sections = allSections;
    if(g) sections = sections.filter(s => s.group === g);
    if(sec) sections = sections.filter(s => s.section_id === sec);
    return sections.reduce((sum, s) => sum + (s.students?.length || 0), 0);
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const [resA, resB] = await Promise.all([
            fetch('/api/get-section?group=أ').then(r => r.ok ? r.json() : {}),
            fetch('/api/get-section?group=ب').then(r => r.ok ? r.json() : {})
        ]);
        allSections = [...deepTrim(resA).sections?.map(s=>({...s,group:'أ'}))||[], ...deepTrim(resB).sections?.map(s=>({...s,group:'ب'}))||[]];
    } catch(e) { console.warn('فشل تحميل الشعب:', e); }

    $('filterGroup').addEventListener('change', () => { updateDropdowns(); loadReports(); });
    $('filterSection').addEventListener('change', () => loadReports());
    $('rptGroup').addEventListener('change', () => { updateDropdowns(); updateRptStudents(); });
    $('rptSection').addEventListener('change', () => { updateRptStudents(); });
    
    document.querySelectorAll('input[name="reportType"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            document.querySelectorAll('.radio-label').forEach(l => l.classList.remove('active'));
            e.target.closest('.radio-label').classList.add('active');
            updateRptStudents();
        });
    });

    $('filterPeriod').addEventListener('change', e => {
        const c = e.target.value === 'custom';
        $('filterStart').style.display = c ? 'inline-block' : 'none';
        $('filterEnd').style.display = c ? 'inline-block' : 'none';
    });

    updateDropdowns();
    loadReports();
});

async function loadReports() {
    const btn = $('loadBtn'); btn.disabled = true; btn.textContent = '⏳ جاري القراءة...';
    const g = $('filterGroup').value, sec = $('filterSection').value, p = $('filterPeriod').value;
    const s = $('filterStart').value, e = $('filterEnd').value;
    let url = `/api/get-reports?action=summary`;
    if(g) url += `&group=${encodeURIComponent(g)}`;
    if(sec) url += `&section=${encodeURIComponent(sec)}`;
    url += `&period=${p}`;
    if(s) url += `&startDate=${s}`;
    if(e) url += `&endDate=${e}`;

    try {
        const res = await fetch(url);
        const json = await res.json();
        const summary = json.data || json.summary || {};
        if(!json.success) throw new Error(json.error);

        $('statTotalStudents').textContent = getActualStudentCount() || 0;
        $('statAbsent').textContent = summary.totalAbsent || 0;
        $('statDays').textContent = summary.totalDays || 0;
        $('statRate').textContent = (summary.avgRate || 0) + '%';

        renderTrendChart(summary.dailyData || []);
        renderSectionChart(summary.sectionData || []);
    } catch(err) { console.error('خطأ التقارير:', err); }
    finally { btn.disabled = false; btn.textContent = '🔄 تحديث البيانات'; }
}

function renderTrendChart(d) { if(trendChart) trendChart.destroy(); trendChart = new Chart($('trendChart').getContext('2d'), { type:'line', data:{ labels:d.map(x=>x.date), datasets:[{label:'غائب',data:d.map(x=>x.absent),borderColor:'#c0392b',backgroundColor:'rgba(192,57,43,0.1)',fill:true,tension:0.3}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}} }); }
function renderSectionChart(d) { if(sectionChart) sectionChart.destroy(); const top=d.slice(0,5); sectionChart = new Chart($('sectionChart').getContext('2d'), { type:'doughnut', data:{labels:top.map(x=>x.section),datasets:[{data:top.map(x=>x.absent),backgroundColor:['#2c3e50','#27ae60','#e67e22','#8e44ad','#16a085'],borderWidth:0}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}} }); }

async function generateCustomReport() {
    const type = document.querySelector('input[name="reportType"]:checked').value;
    const g = $('rptGroup').value, sec = $('rptSection').value;
    if(!g || !sec) return alert('يرجى اختيار المجموعة والشعبة');

    const rpt = $('customReport');
    const btns = $('reportActionsBtn');
    rpt.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">⏳ جاري جلب البيانات...</div>';
    rpt.classList.add('show');
    btns.style.display = 'none';

    try {
        if(type === 'student') {
            const stuId = $('rptStudent').value;
            if(!stuId) return alert('يرجى اختيار الطالب من القائمة');
            const res = await fetch(`/api/get-reports?action=student-history&studentId=${encodeURIComponent(stuId)}`);
            const json = await res.json();
            const history = json.data?.history || json.history || [];
            if(!json.success) throw new Error(json.error);
            
            const stuName = $('rptStudent').selectedOptions[0]?.text || stuId;
            let html = `<div class="report-header"><h2>مدرسة تحفيظ القرآن الكريم - محافظة ظفار</h2><h3>تقرير غياب طالب: ${stuName}</h3><p>المجموعة: ${g} | الشعبة: ${sec} | تاريخ الطباعة: ${new Date().toLocaleDateString('ar-OM')}</p></div>`;
            if(!history.length) html += `<p style="text-align:center;color:var(--secondary)">✅ لا توجد سجلات غياب مسجلة لهذا الطالب</p>`;
            else {
                html += `<table><thead><tr><th>#</th><th>التاريخ</th><th>الشعبة</th><th>المجموعة</th></tr></thead><tbody>`;
                history.forEach((h,i) => html += `<tr><td>${i+1}</td><td>${h.date}</td><td>${h.section}</td><td>${h.group}</td></tr>`);
                html += `</tbody></table><p style="margin-top:15px;font-weight:bold;">📊 إجمالي أيام الغياب: ${history.length}</p>`;
            }
            rpt.innerHTML = html;
        } else {
            const res = await fetch(`/api/get-reports?action=summary&group=${encodeURIComponent(g)}&section=${encodeURIComponent(sec)}&period=custom&startDate=2000-01-01&endDate=2099-12-31`);
            const json = await res.json();
            const summary = json.data || json.summary || {};
            if(!json.success) throw new Error(json.error);
            
            const secLabel = $('rptSection').selectedOptions[0]?.text || sec;
            let html = `<div class="report-header"><h2>مدرسة تحفيظ القرآن الكريم - محافظة ظفار</h2><h3>تقرير غياب شعبة: ${secLabel}</h3><p>المجموعة: ${g} | تاريخ الطباعة: ${new Date().toLocaleDateString('ar-OM')}</p></div>`;
            if(!summary.dailyData?.length) html += `<p style="text-align:center;color:var(--secondary)">✅ لا توجد سجلات غياب مسجلة لهذه الشعبة</p>`;
            else {
                html += `<table><thead><tr><th>#</th><th>التاريخ</th><th>إجمالي الطلاب</th><th>عدد الغائبين</th><th>النسبة</th></tr></thead><tbody>`;
                summary.dailyData.forEach((d,i) => {
                    const rate = d.total > 0 ? ((d.absent/d.total)*100).toFixed(1) : 0;
                    html += `<tr><td>${i+1}</td><td>${d.date}</td><td>${d.total}</td><td>${d.absent}</td><td>${rate}%</td></tr>`;
                });
                html += `</tbody></table><p style="margin-top:15px;font-weight:bold;">📅 إجمالي أيام التسجيل: ${summary.totalDays || 0} | ❌ إجمالي الغياب: ${summary.totalAbsent || 0}</p>`;
            }
            rpt.innerHTML = html;
        }
        btns.style.display = 'flex';
    } catch(e) {
        rpt.innerHTML = `<p style="color:red;text-align:center;">❌ خطأ في جلب التقرير: ${e.message}</p>`;
    }
}
</script>
</body>
</html>
