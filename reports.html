<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الغياب - مدرسة القرآن الكريم</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --light: #ecf0f1; --danger: #c0392b; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--light); }
        header h1 { color: var(--primary); margin: 0; }
        header p { color: #666; margin: 5px 0 0; }
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 25px; padding: 15px; background: var(--light); border-radius: 12px; }
        .filters select, .filters input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .filters button { background: var(--primary); color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, var(--primary), #34495e); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card.green { background: linear-gradient(135deg, var(--secondary), #2ecc71); }
        .stat-card.orange { background: linear-gradient(135deg, var(--accent), #f39c12); }
        .stat-number { font-size: 1.8em; font-weight: bold; margin: 5px 0; }
        .stat-label { font-size: 0.85em; opacity: 0.9; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; border: 2px solid var(--light); }
        .chart-box h3 { margin: 0 0 10px; color: var(--primary); font-size: 1em; }
        .chart-container { position: relative; height: 220px; }
        .search-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .search-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .search-row input, .search-row select { flex: 1; min-width: 120px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
        .search-row button { background: var(--secondary); color: white; padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .result-box { display: none; margin-top: 15px; padding: 15px; background: white; border-radius: 10px; border: 2px solid var(--secondary); }
        .result-box.show { display: block; }
        .absence-list { list-style: none; padding: 0; margin: 10px 0; }
        .absence-list li { padding: 8px 12px; margin: 4px 0; background: #fff5f5; border-right: 4px solid var(--danger); border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.9em; }
        .actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-act { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; }
        .btn-print { background: var(--primary); }
        .btn-share { background: var(--accent); }
        .btn-csv { background: var(--secondary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--light); }
        th { background: var(--light); color: var(--primary); }
        @media print { body { background: white; padding: 0; } .container { box-shadow: none; } .filters, .search-box, .actions { display: none !important; } }
        @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } .filters { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <header><h1>📊 تقارير وإحصائيات الغياب</h1><p>يتم جلب البيانات تلقائياً من مجلد <code>attendance_logs/</code></p></header>

    <div class="filters">
        <select id="filterGroup"><option value="">كل المجموعات</option><option value="أ">المجموعة (أ)</option><option value="ب">المجموعة (ب)</option></select>
        <select id="filterSection"><option value="">كل الشعب</option></select>
        <select id="filterPeriod"><option value="week">آخر 7 أيام</option><option value="month">آخر 30 يوم</option><option value="custom">فترة مخصصة</option></select>
        <input type="date" id="filterStart" style="display:none;"><input type="date" id="filterEnd" style="display:none;">
        <button id="loadBtn" onclick="loadReports()">🔄 تحديث</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">أيام التسجيل</div><div class="stat-number" id="statDays">0</div></div>
        <div class="stat-card green"><div class="stat-label">إجمالي الطلاب</div><div class="stat-number" id="statStudents">0</div></div>
        <div class="stat-card orange"><div class="stat-label">إجمالي الغياب</div><div class="stat-number" id="statAbsent">0</div></div>
        <div class="stat-card"><div class="stat-label">متوسط الغياب</div><div class="stat-number" id="statRate">0%</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><h3>📈 اتجاه الغياب اليومي</h3><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
        <div class="chart-box"><h3>🥧 أعلى 5 شعب غياباً</h3><div class="chart-container"><canvas id="sectionChart"></canvas></div></div>
    </div>

    <div class="search-box">
        <h3 style="margin:0 0 10px">🔍 البحث عن غياب طالب (من ملفات الحفظ)</h3>
        <div class="search-row">
            <input type="text" id="searchStudent" placeholder="أدخل اسم الطالب أو رقمه">
            <button onclick="searchStudent()">🔎 بحث</button>
        </div>
        <div id="resultBox" class="result-box">
            <h4 id="resName" style="margin:0 0 10px;color:var(--primary)">-</h4>
            <ul id="resList" class="absence-list"></ul>
            <p id="noRes" style="display:none;color:var(--secondary);font-weight:600;text-align:center;">✅ لا يوجد غياب مسجل</p>
        </div>
    </div>

    <div class="actions">
        <button class="btn-act btn-print" onclick="window.print()">🖨️ طباعة</button>
        <button class="btn-act btn-share" onclick="navigator.share?.({title:'تقرير الغياب',url:location.href}) || navigator.clipboard.writeText(location.href).then(()=>alert('✅ تم نسخ الرابط'))">🔗 مشاركة</button>
        <button class="btn-act btn-csv" onclick="exportCSV()">📥 تصدير CSV</button>
    </div>

    <div style="overflow-x:auto">
        <table>
            <thead><tr><th>التاريخ</th><th>المجموعة</th><th>الشعبة</th><th>إجمالي</th><th>غائب</th><th>النسبة</th></tr></thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>
</div>

<script>
let trendChart, sectionChart;
const $ = id => document.getElementById(id);

document.getElementById('filterPeriod').addEventListener('change', e => {
    const c = e.target.value === 'custom';
    $('filterStart').style.display = c ? 'inline-block' : 'none';
    $('filterEnd').style.display = c ? 'inline-block' : 'none';
});

async function loadReports() {
    const btn = $('loadBtn'); btn.disabled = true; btn.textContent = '⏳ جاري القراءة من attendance_logs...';
    const g = $('filterGroup').value, sec = $('filterSection').value, p = $('filterPeriod').value;
    const s = $('filterStart').value, e = $('filterEnd').value;
    let url = `/api/get-reports?action=summary`;
    if(g) url += `&group=${g}`;
    if(sec) url += `&section=${sec}`;
    url += `&period=${p}`;
    if(s) url += `&startDate=${s}`;
    if(e) url += `&endDate=${e}`;

    try {
        const res = await fetch(url);
        const { success,  summary } = await res.json();
        if(!success) throw new Error(data.error);

        $('statDays').textContent = summary.totalDays;
        $('statStudents').textContent = summary.totalStudents;
        $('statAbsent').textContent = summary.totalAbsent;
        $('statRate').textContent = summary.avgRate + '%';

        renderTrendChart(summary.dailyData || []);
        renderSectionChart(summary.sectionData || []);
        renderTable(summary.dailyData || []);
    } catch(err) {
        alert('خطأ في جلب التقارير: ' + err.message);
    } finally {
        btn.disabled = false; btn.textContent = '🔄 تحديث';
    }
}

function renderTrendChart(d) {
    if(trendChart) trendChart.destroy();
    trendChart = new Chart($('trendChart').getContext('2d'), {
        type: 'line',
        data: { labels: d.map(x=>x.date), datasets: [{ label: 'غائب',  d.map(x=>x.absent), borderColor: '#c0392b', backgroundColor: 'rgba(192,57,43,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
}

function renderSectionChart(d) {
    if(sectionChart) sectionChart.destroy();
    const top = d.slice(0, 5);
    sectionChart = new Chart($('sectionChart').getContext('2d'), {
        type: 'doughnut',
         { labels: top.map(x=>x.section), datasets: [{  top.map(x=>x.absent), backgroundColor: ['#2c3e50','#27ae60','#e67e22','#8e44ad','#16a085'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

function renderTable(d) {
    const tb = $('tblBody'); tb.innerHTML = '';
    d.forEach(r => {
        const rate = r.total > 0 ? ((r.absent/r.total)*100).toFixed(1) : 0;
        tb.innerHTML += `<tr><td>${r.date}</td><td>-</td><td>جميع الشعب</td><td>${r.total}</td><td>${r.absent}</td><td>${rate}%</td></tr>`;
    });
}

async function searchStudent() {
    const q = $('searchStudent').value.trim();
    if(!q) return alert('أدخل اسم الطالب أو رقمه');
    $('resultBox').classList.remove('show'); $('noRes').style.display='none'; $('resList').innerHTML='';
    try {
        // البحث يعتمد على ID المخزن في ملفات attendance_logs
        const res = await fetch(`/api/get-reports?action=student-history&studentId=${encodeURIComponent(q)}`);
        const { success,  history } = await res.json();
        $('resName').textContent = `نتائج البحث عن: "${q}"`;
        if(!success || !history.length) { $('noRes').style.display='block'; }
        else { history.forEach(h => $('resList').innerHTML += `<li><span>📅 ${h.date}</span><span>${h.group || ''} - ${h.section || ''}</span></li>`); }
        $('resultBox').classList.add('show');
    } catch(e) { alert('فشل البحث: ' + e.message); }
}

function exportCSV() {
    let csv = 'التاريخ,المجموعة,الشعبة,إجمالي,غائب,النسبة\n';
    $('tblBody').querySelectorAll('tr').forEach(tr => {
        csv += Array.from(tr.querySelectorAll('td')).map(td=>td.textContent).join(',') + '\n';
    });
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'تقرير_الغياب.csv'; a.click();
}

// تحميل أولي
window.addEventListener('DOMContentLoaded', loadReports);
</script>
</body>
</html>
